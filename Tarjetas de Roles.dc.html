  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

portant; width:100% !important; padding:0 !important; }\n      .cut { break-inside:avoid; }\n      * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width:880px; margin:0 auto; padding:26px 20px 60px;\">\n\n  <div class=\"no-print\" style=\"display:flex; align-items:center; gap:14px; flex-wrap:wrap; justify-content:space-between; margin-bottom:20px;\">\n    <a href=\"Herramientas para el aula.dc.html\" style=\"display:inline-flex; align-items:center; gap:8px; font-size:.92rem; font-weight:700; color:#82378C;\"><i data-lucide=\"arrow-left\" style=\"width:17px; height:17px;\"><\u002Fi>Volver a Herramientas para el aula<\u002Fa>\n    <button onclick=\"{{ doPrint }}\" style=\"display:inline-flex; align-items:center; gap:9px; background:#82378C; color:#fff; border:none; border-radius:999px; padding:12px 22px; font-weight:800; font-size:.92rem; cursor:pointer; font-family:inherit;\"><i data-lucide=\"printer\" style=\"width:17px; height:17px;\"><\u002Fi>Imprimir / Guardar PDF<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"sheet\" style=\"background:#fff; border-radius:22px; box-shadow:0 18px 50px rgba(0,0,0,.1); padding:30px 32px 34px;\">\n\n    <div style=\"display:flex; align-items:flex-start; gap:13px; margin-bottom:8px;\">\n      <svg width=\"42\" height=\"42\" sc-camel-view-box=\"0 0 100 100\" fill=\"none\" style=\"flex-shrink:0;\"><rect width=\"100\" height=\"100\" rx=\"22\" fill=\"#23303a\"><\u002Frect><rect x=\"26\" y=\"28\" width=\"20\" height=\"44\" rx=\"4\" fill=\"#00a096\"><\u002Frect><rect x=\"52\" y=\"28\" width=\"20\" height=\"44\" rx=\"4\" fill=\"#82378C\"><\u002Frect><circle cx=\"36\" cy=\"38\" r=\"3.4\" fill=\"#fff\"><\u002Fcircle><circle cx=\"62\" cy=\"38\" r=\"3.4\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg>\n      <div>\n        <div style=\"font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:#82378C; margin-bottom:3px;\">Herramientas para el aula · Diversificar los roles<\u002Fdiv>\n        <h1 style=\"font-size:1.55rem; font-weight:800; line-height:1.1; letter-spacing:-.02em;\">Tarjetas de roles<\u002Fh1>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:.96rem; line-height:1.5; color:#5b6770; max-width:620px; margin:6px 0 4px 55px;\">Para las clases de Pensamiento Computacional. <strong style=\"color:#23303a;\">Imprimí, recortá por la línea punteada y —si podés— plastificá para reutilizar.<\u002Fstrong> Repartí un rol a cada integrante del grupo y rotalos cada clase para que todas y todos pasen por todos los roles.<\u002Fp>\n    <div class=\"no-print\" style=\"display:flex; gap:13px; align-items:flex-start; background:#f3eef7; border:1px solid #e3d4ee; border-radius:16px; padding:15px 17px; margin:20px 0 4px 0;\">\n      <div style=\"flex:0 0 36px; width:36px; height:36px; border-radius:11px; background:#82378C; display:flex; align-items:center; justify-content:center;\"><i data-lucide=\"lightbulb\" style=\"width:19px; height:19px; color:#fff;\"><\u002Fi><\u002Fdiv>\n      <div style=\"flex:1;\">\n        <div style=\"font-size:.8rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:#82378C; margin-bottom:3px;\">¿Sin impresora?<\u002Fdiv>\n        <p style=\"font-size:.95rem; line-height:1.45; color:#4a3a55;\">Anotá los roles en el pizarrón y repartilos con un sorteo rápido: cada integrante saca un papelito o dice un número. Igual de simple, sin imprimir nada.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(2, 1fr); gap:14px; margin-top:22px;\">\n      <sc-for list=\"{{ roles }}\" as=\"r\" hint-placeholder-count=\"4\">\n        <div class=\"cut\" style=\"border:2px dashed #c9cdd2; border-radius:18px; overflow:hidden; background:#fff; display:flex; flex-direction:column; min-height:288px;\">\n          <div style=\"background:{{ r.color }}; color:#fff; padding:18px 18px 16px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:10px;\">\n            <div style=\"width:70px; height:70px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center;\"><i data-lucide=\"{{ r.icon }}\" style=\"width:36px; height:36px; color:#fff;\"><\u002Fi><\u002Fdiv>\n            <div>\n              <div style=\"font-size:9.5px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.82); margin-bottom:2px;\">Yo soy<\u002Fdiv>\n              <div style=\"font-size:1.28rem; font-weight:800; line-height:1.1;\">{{ r.name }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:15px 18px 18px; flex:1; display:flex; flex-direction:column; gap:11px;\">\n            <p style=\"font-size:.98rem; line-height:1.42; color:#2a2030; font-weight:600; text-align:center;\">{{ r.desc }}<\u002Fp>\n            <div style=\"display:flex; flex-direction:column; gap:8px; margin-top:auto;\">\n              <div style=\"font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:{{ r.color }}; margin-bottom:1px;\">Mi misión<\u002Fdiv>\n              <sc-for list=\"{{ r.tasks }}\" as=\"t\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex; gap:9px; align-items:flex-start;\"><i data-lucide=\"check\" style=\"width:15px; height:15px; flex-shrink:0; margin-top:2px; color:{{ r.color }};\"><\u002Fi><span style=\"font-size:.92rem; line-height:1.35; color:#374151;\">{{ t }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <p style=\"font-size:.82rem; line-height:1.5; color:#9aa1a8; margin-top:20px; text-align:center;\">Herramientas para el aula · Ceibal — Pensamiento Computacional<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:880,&quot;height&quot;:900}}\">\n\nclass Component extends DCLogic {\n  roles = [\n    { name:\"Programador/a\", icon:\"keyboard\", color:\"#82378C\",\n      desc:\"Yo uso la computadora y programo lo que el grupo decide.\",\n      tasks:[\"Programo en la compu lo que decidimos\",\"Aviso antes de borrar algo\"] },\n    { name:\"Guía\", icon:\"compass\", color:\"#00a096\",\n      desc:\"Yo leo las instrucciones y ayudo a decidir qué hacemos.\",\n      tasks:[\"Leo las instrucciones en voz alta\",\"Digo cuál puede ser el próximo paso\"] },\n    { name:\"Cuidatiempos\", icon:\"timer\", color:\"#50AF32\",\n      desc:\"Yo cuido el tiempo para que todas y todos tengan su turno.\",\n      tasks:[\"Miro el reloj y cuido los turnos\",\"Aviso cuando toca cambiar de rol\"] },\n    { name:\"Vocero/a\", icon:\"megaphone\", color:\"#0E86C8\",\n      desc:\"Yo cuento al resto de la clase lo que trabajó mi grupo y pregunto las dudas cuando algo no se entiende.\",\n      tasks:[\"Cuento a la clase lo que hicimos\",\"Pregunto las dudas de mi grupo\"] }\n  ];\n  componentDidMount(){ this._icons(); }\n  componentDidUpdate(){ this._icons(); }\n  _icons(){ if(window.lucide && window.lucide.createIcons){ try{ window.lucide.createIcons(); }catch(e){} } else { setTimeout(()=>this._icons(),120); } }\n  renderVals(){\n    return { roles:this.roles, doPrint:() => window.print() };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
