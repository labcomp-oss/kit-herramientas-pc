  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ortant; overflow:hidden !important; }\n      .sheet, .adpanel{\n        max-width:100% !important; width:100% !important;\n        border-radius:22px 22px 0 0 !important;\n        max-height:92vh !important; margin:0 !important;\n        animation:sheetup .30s cubic-bezier(.2,.8,.25,1) !important;\n      }\n      .sheet::before, .adpanel::before{\n        content:\"\"; position:absolute; top:9px; left:50%; transform:translateX(-50%);\n        width:44px; height:5px; border-radius:999px; background:rgba(255,255,255,.55); z-index:8; pointer-events:none;\n      }\n    }\n    @media (max-width:420px){\n      .appbar > a, .appbar > button{ font-size:10px; }\n      .appbar svg{ width:22px; height:22px; }\n    }\n    @media print {\n      @page { margin:13mm; }\n      body { background:#fff !important; }\n      .index, .no-print { display:none !important; }\n      .ov { position:static !important; inset:auto !important; background:#fff !important; backdrop-filter:none !important; padding:0 !important; display:block !important; overflow:visible !important; animation:none !important; }\n      .ov2 { position:static !important; inset:auto !important; background:#fff !important; backdrop-filter:none !important; padding:0 !important; display:block !important; overflow:visible !important; animation:none !important; }\n      .sheet, .adpanel { max-width:100% !important; box-shadow:none !important; border-radius:0 !important; margin:0 !important; animation:none !important; }\n      .sheet-body { overflow:visible !important; }\n      textarea { min-height:60px !important; }\n      * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div class=\"index\">\n\n  <!-- ░░░░░ SPLASH DE CARGA (tapa el flash inicial) ░░░░░ -->\n  <sc-if value=\"{{ showBoot }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:fixed; inset:0; z-index:9999; background:#faf9f5; display:flex; align-items:center; justify-content:center; transition:opacity .35s ease; opacity:{{ bootFading }};\">\n      <img src=\"1c3af3e1-707b-4cba-88c4-540177a42028\" alt=\"\" width=\"72\" height=\"72\" style=\"border-radius:18px; box-shadow:0 10px 30px rgba(35,48,58,.18); animation:bootpulse 1.1s ease-in-out infinite;\">\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <header style=\"position:sticky; top:0; z-index:50; background:rgba(255,255,255,.92); backdrop-filter:blur(10px); border-bottom:1px solid #e7e1d4;\">\n    <nav style=\"max-width:1120px; margin:0 auto; padding:13px 24px; display:flex; align-items:center; gap:24px;\">\n      <a href=\"#top\" class=\"brand\" style=\"display:flex; align-items:center; gap:11px; flex-shrink:0;\">\n        <svg width=\"36\" height=\"36\" viewBox=\"0 0 100 100\" fill=\"none\" style=\"flex-shrink:0;\"><rect width=\"100\" height=\"100\" rx=\"22\" fill=\"#23303a\"><\u002Frect><rect x=\"26\" y=\"28\" width=\"20\" height=\"44\" rx=\"4\" fill=\"#00a096\"><\u002Frect><rect x=\"52\" y=\"28\" width=\"20\" height=\"44\" rx=\"4\" fill=\"#82378C\"><\u002Frect><circle cx=\"36\" cy=\"38\" r=\"3.4\" fill=\"#fff\"><\u002Fcircle><circle cx=\"62\" cy=\"38\" r=\"3.4\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg>\n        <span style=\"font-size:1.14rem; font-weight:800; letter-spacing:-.02em; line-height:1.05;\"><span style=\"color:#23303a;\">Herramientas<\u002Fspan> <span style=\"color:#82378C;\">para el aula<\u002Fspan><\u002Fspan>\n      <\u002Fa>\n      <div class=\"navlinks\" style=\"margin-left:auto; display:flex; align-items:center; gap:8px;\">\n        <a href=\"#recursos\" style=\"font-size:.92rem; font-weight:600; color:#5b6770; padding:8px 13px; border-radius:999px;\" style-hover=\"background:#82378C12; color:#82378C;\">Recursos<\u002Fa>\n        <a href=\"#foro\" style=\"font-size:.92rem; font-weight:600; color:#5b6770; padding:8px 13px; border-radius:999px;\" style-hover=\"background:#82378C12; color:#82378C;\">Foro<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <section id=\"top\" style=\"position:relative; overflow:hidden; background:#f4ecf7; border-bottom:1px solid #e6dcec;\">\n    <div style=\"position:absolute; right:-90px; top:-90px; width:280px; height:280px; border-radius:50%; background:#00a09612;\"><\u002Fdiv>\n    <div style=\"position:absolute; right:52px; top:0; bottom:0; display:flex; align-items:center; gap:9px;\" class=\"hero-deco\">\n      <span style=\"width:16px; height:70px; border-radius:8px; background:#00a096;\"><\u002Fspan>\n      <span style=\"width:16px; height:104px; border-radius:8px; background:#82378C;\"><\u002Fspan>\n      <span style=\"width:16px; height:52px; border-radius:8px; background:#FFC800;\"><\u002Fspan>\n      <span style=\"width:16px; height:80px; border-radius:8px; background:#5AC8F0;\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"position:relative; z-index:2; max-width:1120px; margin:0 auto; padding:44px 24px 40px;\">\n      <div style=\"max-width:660px;\">\n        <div style=\"display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:800; letter-spacing:.13em; text-transform:uppercase; color:#82378C; background:#82378C12; padding:7px 14px; border-radius:999px;\"><i data-lucide=\"library\" style=\"width:14px; height:14px;\"><\u002Fi>Repositorio<\u002Fdiv>\n        <h1 style=\"font-size:clamp(2.2rem, 4.6vw, 3.2rem); font-weight:800; line-height:1.04; margin:16px 0 14px; color:#23303a;\">Herramientas para el aula<\u002Fh1>\n        <p style=\"font-size:clamp(1.05rem, 2vw, 1.22rem); line-height:1.5; color:#5b6770; max-width:600px;\">Un espacio para encontrar recursos para enseñar <strong style=\"color:#23303a; font-weight:700;\">Pensamiento Computacional<\u002Fstrong>, fortaleciendo la <strong style=\"color:#23303a; font-weight:700;\">participación<\u002Fstrong> y la <strong style=\"color:#23303a; font-weight:700;\">confianza<\u002Fstrong> en el aula. Empezá por el autodiagnóstico, explorá las tarjetas y compartí tus experiencias en el foro.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"recursos\" class=\"sec\" style=\"max-width:1120px; margin:0 auto; padding:40px 24px 20px;\">\n\n    <div class=\"no-print\" style=\"display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin-bottom:26px;\">\n      <span style=\"display:inline-flex; align-items:center; gap:7px; font-size:.8rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:#9aa1a8; margin-right:4px;\"><i data-lucide=\"list-filter\" style=\"width:15px; height:15px;\"><\u002Fi>Filtrar<\u002Fspan>\n      <sc-for list=\"{{ filterChips }}\" as=\"chip\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ chip.set }}\" style=\"display:inline-flex; align-items:center; gap:8px; font-size:.9rem; font-weight:700; padding:9px 16px; border-radius:999px; cursor:pointer; font-family:inherit; background:{{ chip.bg }}; color:{{ chip.color }}; border:1.5px solid {{ chip.border }};\">\n          <span style=\"width:9px; height:9px; border-radius:999px; background:{{ chip.dot }};\"><\u002Fspan>{{ chip.label }}\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showAutodiag }}\" hint-placeholder-val=\"{{ true }}\">\n      <div class=\"diag-card\" style=\"position:relative; overflow:hidden; background:#faf6fb; border:1.5px solid #e7d9ea; border-radius:22px; padding:30px 34px; display:flex; align-items:center; gap:28px; flex-wrap:wrap; margin-bottom:26px;\">\n        <div style=\"position:absolute; left:-40px; top:-40px; width:150px; height:150px; border-radius:50%; background:#82378C0a;\"><\u002Fdiv>\n        <div style=\"position:relative; z-index:2; width:72px; height:72px; flex-shrink:0; border-radius:20px; background:#82378C; display:flex; align-items:center; justify-content:center;\"><i data-lucide=\"compass\" style=\"width:34px; height:34px; color:#fff;\"><\u002Fi><\u002Fdiv>\n        <div class=\"diag-body\" style=\"position:relative; z-index:2; flex:1; min-width:2 order-radius:999px; padding:12px 22px; font-weight:800; font-size:.92rem; cursor:pointer; font-family:inherit;\" style-hover=\"opacity:.9;\"><i data-lucide=\"download\" style=\"width:17px; height:17px;\"><\u002Fi>Guardá tu ficha<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ adOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div class=\"ov2\" onclick=\"{{ closeAd }}\" style=\"position:fixed; inset:0; z-index:110; background:rgba(15,32,44,.6); backdrop-filter:blur(4px); display:flex; align-items:flex-start; justify-content:center; padding:28px 20px; overflow-y:auto;\">\n    <div class=\"adpanel\" onclick=\"{{ stop }}\" style=\"position:relative; width:100%; max-width:640px; background:#fff; border-radius:22px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.4); margin:auto;\">\n      <button onclick=\"{{ closeAd }}\" style=\"position:absolute; top:15px; right:15px; z-index:6; width:34px; height:34px; border:none; border-radius:999px; background:rgba(255,255,255,.2); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;\" style-hover=\"background:rgba(255,255,255,.34);\"><i data-lucide=\"x\" style=\"width:18px; height:18px;\"><\u002Fi><\u002Fbutton>\n\n      <div style=\"background:#82378C; color:#fff; padding:24px 30px 22px;\">\n        <div style=\"display:flex; align-items:center; gap:10px;\"><i data-lucide=\"compass\" style=\"width:20px; height:20px;\"><\u002Fi><span style=\"font-size:12px; font-weight:800; letter-spacing:.1em; text-transform:uppercase;\">Autodiagnóstico<\u002Fspan><\u002Fdiv>\n        <sc-if value=\"{{ adIsQuestion }}\">\n          <div style=\"margin-top:16px;\">\n            <div style=\"display:flex; justify-content:space-between; font-size:.8rem; font-weight:600; color:rgba(255,255,255,.85); margin-bottom:7px;\"><span>{{ adProgressLabel }}<\u002Fspan><span>{{ adDimension }}<\u002Fspan><\u002Fdiv>\n            <div style=\"height:6px; border-radius:999px; background:rgba(255,255,255,.22); overflow:hidden;\"><div style=\"height:100%; border-radius:999px; background:#7FD957; width:{{ adProgressPct }}; transition:width .3s ease;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ adIsQuestion }}\">\n        <div style=\"padding:26px 30px 24px;\">\n          <h2 style=\"font-size:1.3rem; font-weight:800; line-height:1.25; color:#23303a; margin-bottom:20px;\">{{ adQuestionText }}<\u002Fh2>\n          <div style=\"display:flex; flex-direction:column; gap:11px;\">\n            <sc-for list=\"{{ adOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n              <div onclick=\"{{ opt.select }}\" style=\"display:flex; gap:14px; align-items:flex-start; padding:15px 17px; border:2px solid {{ opt.border }}; background:{{ opt.bg }}; border-radius:14px; cursor:pointer; transition:border-color .12s ease, background .12s ease;\">\n                <span style=\"flex-shrink:0; width:28px; height:28px; border-radius:999px; background:{{ opt.chipBg }}; color:{{ opt.chipColor }}; font-weight:800; font-size:.9rem; display:flex; align-items:center; justify-content:center;\">{{ opt.letter }}<\u002Fspan>\n                <span style=\"font-size:1rem; line-height:1.45; color:#374151; padding-top:3px;\">{{ opt.text }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; justify-content:space-between; gap:14px; margin-top:24px;\">\n            <sc-if value=\"{{ adShowBack }}\">\n              <button onclick=\"{{ adBack }}\" style=\"display:inline-flex; align-items:center; gap:8px; background:transparent; color:#82378C; border:none; font-size:.95rem; font-weight:700; cursor:pointer; font-family:inherit; padding:10px 4px;\"><i data-lucide=\"arrow-left\" style=\"width:17px; height:17px;\"><\u002Fi>Atrás<\u002Fbutton>\n            <\u002Fsc-if>\n            <div style=\"flex:1;\"><\u002Fdiv>\n            <button onclick=\"{{ adNext }}\" style=\"display:inline-flex; align-items:center; gap:9px; background:{{ adNextBg }}; color:#fff; border:none; font-size:.95rem; font-weight:800; padding:13px 24px; border-radius:999px; cursor:{{ adNextCursor }}; font-family:inherit;\">{{ adNextLabel }} <i data-lucide=\"arrow-right\" style=\"width:17px; height:17px;\"><\u002Fi><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ adIsResults }}\">\n        <div style=\"padding:28px 30px 30px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:14px;\"><div style=\"width:46px; height:46px; border-radius:14px; background:#82378C12; display:flex; align-items:center; justify-content:center;\"><i data-lucide=\"sparkles\" style=\"width:24px; height:24px; color:#82378C;\"><\u002Fi><\u002Fdiv><div><div style=\"font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:#82378C;\">Gracias por reflexionar<\u002Fdiv><div style=\"font-size:1.2rem; font-weight:800; color:#23303a;\">Tu devolución<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <p style=\"font-size:.92rem; line-height:1.5; color:#9aa1a8; margin-bottom:14px;\">No hay respuestas correctas o incorrectas: este autodiagnóstico es simplemente una invitación a mirar tu propia práctica.<\u002Fp>\n          <div style=\"background:#82378C0f; border-left:4px solid #82378C; border-radius:0 14px 14px 0; padding:16px 20px; margin-bottom:24px; display:flex; flex-direction:column; gap:11px;\">\n            <sc-for list=\"{{ adMessage }}\" as=\"para\" hint-placeholder-count=\"3\">\n              <p style=\"font-size:1.05rem; line-height:1.55; color:#374151;\">{{ para }}<\u002Fp>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size:.78rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:#5b6770; margin-bottom:13px;\">Te sugerimos empezar por<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:11px; margin-bottom:24px;\">\n            <sc-for list=\"{{ adRecs }}\" as=\"rec\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ rec.open }}\" style=\"display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:14px; background:#faf8f4; border:1px solid #eee3ec; cursor:pointer;\" style-hover=\"background:#fff; border-color:{{ rec.color }};\">\n                <div style=\"width:46px; height:46px; flex-shrink:0; border-radius:13px; background:{{ rec.color }}; display:flex; align-items:center; justify-content:center;\"><i data-lucide=\"{{ rec.icon }}\" style=\"width:23px; height:23px; color:#fff;\"><\u002Fi><\u002Fdiv>\n                <div style=\"flex:1;\"><div style=\"font-size:10px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:{{ rec.color }}; margin-bottom:2px;\">{{ rec.catLabel }}<\u002Fdiv><div style=\"font-size:1rem; font-weight:700; line-height:1.2; color:#23303a;\">{{ rec.title }}<\u002Fdiv><\u002Fdiv>\n                <i data-lucide=\"arrow-right\" style=\"width:18px; height:18px; flex-shrink:0; color:{{ rec.color }};\"><\u002Fi>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:11px; align-items:flex-start; background:#faf8f4; border-radius:13px; padding:14px 16px; margin-bottom:24px;\">\n            <i data-lucide=\"info\" style=\"width:17px; height:17px; flex-shrink:0; margin-top:2px; color:#82378C;\"><\u002Fi>\n            <p style=\"font-size:.9rem; line-height:1.5; color:#6b7280;\">{{ adCierre }}<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"no-print\" style=\"display:flex; gap:11px; flex-wrap:wrap;\">\n            <button onclick=\"{{ saveAd }}\" style=\"flex:1; min-width:180px; display:inline-flex; align-items:center; justify-content:center; gap:9px; background:#82378C; color:#fff; border:none; font-size:.95rem; font-weight:800; padding:14px 20px; border-radius:999px; cursor:pointer; font-family:inherit;\" style-hover=\"opacity:.92;\"><i data-lucide=\"download\" style=\"width:17px; height:17px;\"><\u002Fi>Guardá tu devolución<\u002Fbutton>\n            <button onclick=\"{{ goHerramientas }}\" style=\"display:inline-flex; align-items:center; justify-content:center; gap:9px; background:#f1ece1; color:#5b6770; border:none; font-size:.95rem; font-weight:700; padding:14px 20px; border-radius:999px; cursor:pointer; font-family:inherit;\" style-hover=\"background:#e7e1d4;\"><i data-lucide=\"layout-grid\" style=\"width:17px; height:17px;\"><\u002Fi>Ver todas las herramientas<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:860}}\">\nclass Component extends DCLogic {\n  state = { open:null, checks:{}, radios:{}, texts:{}, dates:{}, adOpen:false, adStep:0, adAnswers:{}, fromAd:false, filter:\"all\", foroOpen:false, creaCopied:false, showBoot:true, bootFading:1 };\n\n  foroUrl = \"#\";\n  formUrl = \"https://forms.gle/Ha4WB8N3xQRNeD9f7\";\n\n  cats = {\n    obs: { label:\"Observación\", color:\"#00a096\" },\n    acc: { label:\"Acción\",      color:\"#82378C\" }\n  };\n\n  data = [\n    { cat:\"obs\", icon:\"eye\", title:\"Observá la participación\",\n      desc:\"Prestá atención a quiénes participan, quiénes lideran y quiénes quedan en segundo plano.\",\n      momento:\"Durante la clase\",\n      encontras:[\"Preguntas guía para observar la dinámica\",\"Una ficha rápida para marcar al cierre\",\"Un espacio para compartir en el foro\"],\n      porqueLead:\"La participación no siempre se distribuye igual entre estudiantes.\",\n      porque:\"Observar estos patrones te ayuda a generar más oportunidades para que todas y todos desarrollen confianza y se involucren.\",\n      blocks:[\n        { kind:\"prompts\", icon:\"eye\", label:\"Durante la clase observá\", items:[\n          \"¿Quiénes *participan más*? ¿Quiénes *participan menos*?\",\n          \"¿Quiénes *manejan la computadora* durante la actividad?\" ] },\n        { kind:\"checkgroups\", icon:\"check-square\", label:\"Al finalizar, marcá lo que observaste\", groups:[\n          { title:\"Participación\", items:[\"Predominaron los niños.\",\"Predominaron las niñas.\",\"Participaron de forma equilibrada.\"] },\n          { title:\"Uso de la computadora\", items:[\"Predominaron los niños.\",\"Predominaron las niñas.\",\"El uso fue equilibrado.\"] } ] },\n        { kind:\"write\", icon:\"message-circle\", label:\"Para pensar\",\n          prompt:\"¿Te llamó la atención algo de lo que observaste?\" },\n        { kind:\"foro\", text:\"Te invitamos a compartirlo en el foro y así conocer experiencias de tus colegas.\" }\n      ] },\n\n    { cat:\"obs\", icon:\"message-square-quote\", title:\"Feedback que impulsa\",\n      desc:\"Observá qué aspectos reconocés al dar devoluciones en clase.\",\n      momento:\"Al dar devoluciones\",\n      encontras:[\"Una autoevaluación de qué reconocés en clase\",\"Un espacio para tu reflexión\",\"Un espacio para compartir en el foro\"],\n      porqueLead:\"Las devoluciones que reciben las y los estudiantes influyen en cómo interpretan sus logros, dificultades y posibilidades de aprender.\",\n      porque:\"Cuando se centran en el proceso, ofrecen información para mejorar y favorecen que se animen a seguir intentando.\",\n      blocks:[\n        { kind:\"check\", icon:\"check-square\", label:\"Durante la clase, enfoqué mis devoluciones en…\", items:[\n          \"El *esfuerzo* o la persistencia.\",\n          \"Las *estrategias* o la forma de resolver.\",\n          \"Los *avances*, aunque sean pequeños.\",\n          \"Las *respuestas correctas* o el resultado final.\" ] },\n        { kind:\"write\", icon:\"message-circle\", label:\"Para pensar\",\n          prompt:\"¿Qué mensaje quiero que transmitan mis devoluciones a mis estudiantes?\" },\n        { kind:\"foro\", text:\"Sumate a la conversación en el foro y comentalo con tus colegas.\" }\n      ] },\n\n    { cat:\"acc\", icon:\"users-round\", title:\"Estrategias para distribuir la participación\",\n      desc:\"Pequeños cambios antes de pedir respuestas pueden hacer que más estudiantes se animen a participar.\",\n      momento:\"En la coordinación con el DR\",\n      encontras:[\"Dos estrategias listas para proponer\",\"Un espacio para tu reflexión\",\"Un espacio para compartir en el foro\"],\n      porqueLead:\"Si pedís respuestas al instante, suelen participar siempre las mismas personas.\",\n      porque:\"Dar tiempo para pensar y anticipar la participación abre la oportunidad a más estudiantes.\",\n      blocks:[\n        { kind:\"strategies\", icon:\"lightbulb\", label:\"Dos estrategias para acordar con el docente remoto\", items:[\n          { n:\"1\", title:\"Pensá, conversá, compartí\",\n            steps:[\n              { t:\"Pensá\", d:\"30 segundos para pensar en forma individual.\" },\n              { t:\"Conversá\", d:\"1 minuto en parejas o pequeños grupos.\" },\n              { t:\"Compartí\", d:\"Invitá a compartir a estudiantes diferentes en cada actividad.\" }\n            ],\n            takeaway:\"Así más estudiantes preparan una respuesta antes de hablar en público.\" },\n          { n:\"2\", title:\"Aviso anticipado\",\n            quote:\"En unos minutos voy a pedir que algunas personas compartan qué piensan. Tómense un momento para prepararse.\",\n            takeaway:\"Anticipar la participación ayuda a que más personas se animen a intervenir.\" }\n        ] },\n        { kind:\"write\", icon:\"message-circle\", label:\"Para pensar\",\n          prompt:\"¿Qué idea vas a probar?\" },\n        { kind:\"foro\", text:\"Entrá al foro, conocé qué se está probando en otras aulas y compartí tu propia experiencia.\" }\n      ] },\n\n    { cat:\"acc\", icon:\"languages\", title:\"Lenguaje inclusivo y no estereotipado\",\n      desc:\"Evitá reforzar asociaciones de género con las disciplinas STEM, en todo momento de la clase.\",\n      momento:\"En todo momento\",\n      encontras:[\"Una pregunta para revisar tu lenguaje\",\"Reemplazos concretos para usar ya\",\"Una idea para acordar con el grupo\"],\n      porqueLead:\"El lenguaje también enseña.\",\n      porque:\"Nombrar a todo el grupo evita reforzar la idea de que las disciplinas STEM son cosa de varones.\",\n      blocks:[\n        { kind:\"prompts\", icon:\"search\", label:\"Primero, revisá\", items:[\n          \"¿Los términos, el lenguaje, la comunicación, la forma y los ejemplos que usás en clase son *inclusivos*?\" ] },\n        { kind:\"terms\", label:\"Probá estos reemplazos\", items:[\n          { antes:\"los alumnos\", despues:\"las y los estudiantes · el estudiantado\" },\n          { antes:\"chicos\", despues:\"chicas y chicos · el grupo\" },\n          { antes:\"los científicos\", despues:\"científicas y científicos\" },\n          { antes:\"bienvenidos\", despues:\"bienvenidas y bienvenidos\" }\n        ], foot:\"También podés construir con el grupo *acuerdos de convivencia* que incluyan el lenguaje inclusivo, y colocar un *cartel visible* con ejemplos concretos.\" },\n        { kind:\"write\", icon:\"handshake\", label:\"Para la próxima clase\",\n          prompt:\"¿Qué término o cambio vas a empezar a usar?\" },\n        { kind:\"foro\", text:\"Conocé qué términos están usando tus colegas y compartí los tuyos.\" }\n      ] },\n\n    { cat:\"acc\", icon:\"shield-check\", title:\"Más confianza para enfrentar desafíos\",\n      desc:\"Las dificultades y los errores son oportunidades para construir confianza en las propias capacidades.\",\n      momento:\"Ante un error o frustración\",\n      encontras:[\"Frases para acompañar el error\",\"Ideas para valorar la persistencia\",\"Un acuerdo para la próxima clase\"],\n      porqueLead:\"Las niñas suelen mostrar menos confianza en STEM, aun con igual desempeño.\",\n      porque:\"Cómo acompañamos los desafíos y los errores ayuda a fortalecer esa confianza.\",\n      blocks:[\n        { kind:\"ideas\", icon:\"lightbulb\", label:\"Ideas para probar\", items:[\n          { label:\"Reconocé estrategias\", quote:\"Probaste *distintas opciones* hasta encontrar una solución.\" },\n          { label:\"Normalizá los errores\", quote:\"Equivocarse *también es parte de aprender*.\" },\n          { label:\"Valorá la persistencia\", quote:\"Seguiste *intentando* aunque era difícil.\" },\n          { label:\"Preguntá antes de resolver\", quote:\"¿Qué podrías *probar ahora*?\" }\n        ] },\n        { kind:\"write\", icon:\"handshake\", label:\"Acuerdo para la próxima clase\",\n          prompt:\"¿Qué mensaje o estrategia vas a incorporar, y en qué momento?\" },\n        { kind:\"foro\", text:\"Inspirate y compartí con tus colegas en el foro.\" }\n      ] },\n\n    { cat:\"acc\", icon:\"shuffle\", title:\"Diversificar los roles\",\n      desc:\"Que niñas y niños asuman por igual los diferentes roles y tareas en PC (organizar, programar, presentar, etc.).\",\n      momento:\"Al armar grupos\",\n      encontras:[\"Pasos para preparar los roles antes de empezar\",\"Acciones concretas durante la clase\",\"Un espacio para compartir en el foro\"],\n      porqueLead:\"\",\n      porque:\"Puede suceder que ciertos roles o tareas siempre recaigan en las mismas personas. Por ejemplo, es común que el rol de programar termine recayendo más en los niños, y el de presentar el trabajo al resto del aula en las niñas. Esto no responde a diferencias de capacidad, sino a patrones que se repiten sin que nos demos cuenta. Por eso es importante que los roles roten entre niñas y niños, para que todos y todas puedan formarse y ganar confianza en los distintos roles.\",\n      blocks:[\n        { kind:\"note\", label:\"Antes de empezar la actividad\", items:[\n          { icon:\"target\", text:\"Identificá cuál será el *rol técnico principal* (por ejemplo: programar, manejar el dispositivo o construir).\" },\n          { icon:\"history\", text:\"Pensá *quiénes ocuparon ese rol* en las últimas clases.\" },\n          { icon:\"layout-grid\", text:\"Prepará tarjetas para asignar los roles a *todo el equipo*.\" } ] },\n        { kind:\"check\", label:\"Durante la actividad\", items:[\n          \"Asigná el rol técnico a un/a estudiante que haya tenido *menos oportunidades* de desempeñarlo.\",\n          \"Explicá que *todos los integrantes* del equipo irán teniendo la oportunidad de asumir ese rol en distintas clases.\",\n          \"Recorré el aula: acercarte *reduce la barrera* para pedir ayuda en público.\" ] },\n        { kind:\"write\", icon:\"message-circle\", label:\"Para pensar\",\n          prompt:\"¿Qué pasó cuando organizaste los roles?\" },\n        { kind:\"foro\", text:\"Sumate a la conversación en el foro y comentalo ahí con tus colegas!\" }\n      ] }\n  ];\n\n  adData = [\n    { dim:\"obs\", label:\"Qué valorás\", q:\"¿Qué te parece importante promover en el grupo durante una clase de Pensamiento Computacional?\",\n      opts:[ \"Que desarrollen habilidades para resolver desafíos.\",\n             \"Que se interesen y disfruten las actividades.\",\n             \"Que aprendan a trabajar colaborativamente.\",\n             \"Que tengan las mismas oportunidades de asumir distintos roles y participar.\" ] },\n    { dim:\"obs\", label:\"Qué observás\", q:\"¿A qué solés prestar atención durante las clases de Pensamiento Computacional?\",\n      opts:[ \"Si mis estudiantes logran completar la actividad propuesta.\",\n             \"Si mis estudiantes muestran interés y motivación.\",\n             \"Cómo se organizan y trabajan los grupos.\",\n             \"Quiénes participan más, quiénes participan menos y qué roles asumen.\" ] },\n    { dim:\"obs\", label:\"Diferencias en la participación\", q:\"Según tu experiencia, cuando algunas personas participan menos que otras durante la clase de Pensamiento Computacional, ¿a qué creés que puede deberse?\",\n      opts:[ \"A que tienen intereses diferentes, ya que las propuestas y las oportunidades de participación son las mismas para todas.\",\n             \"A que tienen más experiencia o afinidad y se sienten más preparadas para la tarea.\",\n             \"A que la dinámica del grupo puede favorecer que algunas participen más que otras.\",\n             \"A que los mensajes y expectativas que reciben fuera del aula influyen en su confianza para participar.\" ] },\n    { dim:\"acc\", label:\"Tu rol en el programa\", q:\"Pensando en tu rol durante las clases de Pensamiento Computacional, ¿cuál es tu principal aporte dentro del programa?\",\n      opts:[ \"Mi principal aporte es acompañar aspectos organizativos de la clase.\",\n             \"Mi principal aporte es brindar apoyo a estudiantes cuando lo necesitan.\",\n             \"Mi principal aporte es observar cómo participa el grupo y favorecer que todas las personas se involucren.\",\n             \"Mi principal aporte es planificar junto al docente remoto cómo organizar la participación y acompañar el aprendizaje del grupo.\" ] },\n    { dim:\"acc\", label:\"Roles técnicos\", q:\"Si durante una actividad de programación en equipos observás que siempre son las mismas personas quienes usan el teclado, ¿qué hacés?\",\n      opts:[ \"Permitir que cada equipo distribuya los roles como prefiera.\",\n             \"Conversar con el equipo para entender cómo se organizaron.\",\n             \"Animar a que prueben tareas diferentes.\",\n             \"Coordinar junto al docente remoto estrategias para diversificar los roles.\" ] },\n    { dim:\"acc\", label:\"Confianza\", q:\"Si una estudiante evita participar porque cree que “no es buena para Pensamiento Computacional”, ¿qué hacés?\",\n      opts:[ \"Respetar su decisión y acompañarla desde el rol que prefiera asumir.\",\n             \"Animarla a intentarlo.\",\n             \"Ayudarla a reconocer avances o logros concretos que ya alcanzó.\",\n             \"Generar oportunidades graduales para que gane confianza en ese tipo de tareas.\" ] }\n  ];\n\n  adProfiles = {\n    AA: {\n      msg:[ \"Tus respuestas muestran que **ya prestás atención a cómo se distribuye la participación en el aula**: quiénes se involucran, quiénes quedan afuera, cómo se organizan los equipos.\",\n            \"Y que cuando notás algo, *tenés recursos para intervenir*.\",\n            \"Las herramientas del kit te ofrecen formas concretas de llevar lo que ya observás a pequeñas acciones dentro del aula.\" ],\n      recs:[5,1,2] },\n    BA: {\n      msg:[ \"Tus respuestas muestran que **tenés disposición para acompañar a tus estudiantes y actuar cuando algo no funciona**.\",\n            \"Esa actitud es *el motor de cualquier cambio* en el aula.\",\n            \"Las herramientas del kit pueden ayudarte a conectar esa disposición con algunas dinámicas que a veces pasan desapercibidas: quiénes asumen roles técnicos, quiénes piden ayuda en voz alta y quiénes prefieren no hacerlo.\" ],\n      recs:[0,1,4] },\n    AB: {\n      msg:[ \"Tus respuestas muestran que **sos observadora de lo que pasa en el aula**: notás cómo se organizan los grupos, quiénes participan más y quiénes menos.\",\n            \"Esa capacidad de observación es *el primer paso para cualquier cambio*.\",\n            \"Las herramientas del kit proponen acciones concretas para transformar observaciones en pequeñas decisiones fáciles de aplicar dentro del aula.\" ],\n      recs:[2,4,5] },\n    BB: {\n      msg:[ \"Tus respuestas sugieren que **tu foco está puesto en acompañar a tus estudiantes en lo que necesitan en el momento**.\",\n            \"Esa es *la base de una buena relación pedagógica*.\",\n            \"Las herramientas del kit invitan a sumar una nueva mirada: prestar atención a algunas dinámicas de participación que pueden pasar desapercibidas, y probar pequeños cambios que no requieren modificar cómo trabajás.\" ],\n      recs:[0,3,1] }\n  };\n  adCierre = \"El kit completo tiene 6 tarjetas — a lo largo de la intervención vas a ir recibiendo propuestas para explorarlas todas.\";\n\n  headerIcon(kind){\n    return ({ prompts:\"list\", check:\"check-square\", matrix:\"smile\", ideas:\"lightbulb\",\n      terms:\"replace\", note:\"info\", semaforo:\"circle-dot\", write:\"message-circle\", links:\"package\",\n      checkgroups:\"check-square\", foro:\"messages-square\", strategies:\"lightbulb\" })[kind] || \"circle\";\n  }\n\n  componentDidMount(){\n    let savedAdAnswers = {};\n    try {\n      const s = JSON.parse(localStorage.getItem(\"aulaactiva\") || \"{}\");\n      savedAdAnswers = s.adAnswers || {};\n      this.setState({\n        checks: s.checks || {}, radios: s.radios || {},\n        texts: s.texts || {}, dates: s.dates || {}, adAnswers: savedAdAnswers\n      });\n    } catch(e){}\n    if(window.location.hash === \"#autodiagnostico\" || window.location.hash === \"#autotest\"){\n      const done = Object.keys(savedAdAnswers).length >= 6;\n      this.setState({ adOpen:true, adStep: done ? 6 : 0 });\n    }\n    this._icons();\n    // Splash de carga: se mantiene un instante para tapar el parpadeo inicial del montaje, luego se apaga con fade.\n    setTimeout(() => {\n      this.setState({ bootFading:0 });\n      setTimeout(() => this.setState({ showBoot:false }), 380);\n    }, 420);\n  }\n  componentDidUpdate(){ this._icons(); }\n  _icons(){\n    if(window.lucide && window.lucide.createIcons){ try { window.lucide.createIcons(); } catch(e){} }\n    else { setTimeout(()=>this._icons(), 120); }\n  }\n  persist(){\n    const { checks, radios, texts, dates, adAnswers } = this.state;\n    try { localStorage.setItem(\"aulaactiva\", JSON.stringify({ checks, radios, texts, dates, adAnswers })); } catch(e){}\n  }\n  setCheck(k){ this.setState(s => ({ checks:{ ...s.checks, [k]: !s.checks[k] } }), () => this.persist()); }\n  setRadio(k,v){ this.setState(s => ({ radios:{ ...s.radios, [k]: v } }), () => this.persist()); }\n  setText(k,v){ this.setState(s => ({ texts:{ ...s.texts, [k]: v } }), () => this.persist()); }\n  setDate(k,v){ this.setState(s => ({ dates:{ ...s.dates, [k]: v } }), () => this.persist()); }\n\n  // Traductor de markdown ligero: **negrita** y *cursiva*\n  rich(str, color){\n    if(str == null) return str;\n    const parts = String(str).split(/\\*([^*]+)\\*/g);\n    return React.createElement(React.Fragment, null, parts.map((p,i) =>\n      i % 2 === 1 ? React.createElement(\"strong\", { key:i, style:{ color, fontWeight:800 } }, p) : p\n    ));\n  }\n\n  // Traductor completo: soporta **negrita** y *cursiva* en el mismo texto\n  richFull(str, boldColor){\n    if(str == null) return str;\n    const col = boldColor || \"#82378C\";\n    const nodes = [];\n    let key = 0;\n    String(str).split(/\\*\\*([^*]+)\\*\\*/g).forEach((seg, bi) => {\n      if(bi % 2 === 1){\n        nodes.push(React.createElement(\"strong\", { key:key++, style:{ color:col, fontWeight:800 } }, seg));\n      } else if(seg){\n        seg.split(/\\*([^*]+)\\*/g).forEach((s, ii) => {\n          if(ii % 2 === 1) nodes.push(React.createElement(\"em\", { key:key++, style:{ fontStyle:\"italic\", color:\"#23303a\" } }, s));\n          else if(s) nodes.push(React.createElement(React.Fragment, { key:key++ }, s));\n        });\n      }\n    });\n    return React.createElement(React.Fragment, null, nodes);\n  }\n\n  computeProfile(){\n    const { adAnswers } = this.state;\n    let obs = 0, acc = 0;\n    this.adData.forEach((q,qi) => {\n      const a = adAnswers[qi];\n      if(a === undefined) return;\n      if(a >= 2){\n        if(q.dim === \"obs\") obs++; else acc++;\n      }\n    });\n    const obsHigh = obs >= 2, accHigh = acc >= 2;\n    const key = (obsHigh ? \"A\" : \"B\") + (accHigh ? \"A\" : \"B\");\n    return this.adProfiles[key];\n  }\n\n  computeRecs(){ return this.computeProfile().recs; }\n  recsMessage(){ return this.computeProfile().msg; }\n\n  renderVals(){\n    const { open, checks, radios, texts, dates, adOpen, adStep, adAnswers, filter, showBoot, bootFading } = this.state;\n    const tint = (c) => c + \"14\";\n    const VIOLET = \"#82378C\";\n    const R = (s) => this.rich(s, open!=null ? this.cats[this.data[open].cat].color : \"#000\");\n\n    const hexShadow = (hex) => {\n      const h = hex.replace(\"#\",\"\"); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);\n      return `rgba(${r},${g},${b},.34)`;\n    };\n    const accents = [\"#FFC800\",\"#F09100\",\"#FFC800\",\"#50AF32\",\"#FFC800\",\"#5AC8F0\"];\n    const tools = this.data.map((t,i) => {\n      const c = this.cats[t.cat].color;\n      return { title:t.title, icon:t.icon, momento:t.momento, catKey:t.cat,\n        catLabel:this.cats[t.cat].label, color:c, tint:tint(c),\n        shadow:hexShadow(c), accent:accents[i % accents.length],\n        n:String(i+1).padStart(2,\"0\"),\n        encontras:t.encontras, open:() => this.setState({ open:i }) };\n    });\n\n    const adDone = Object.keys(adAnswers).length >= 6;\n    const chipDefs = [\n      { key:\"all\",      label:\"Todo\",            dot:\"#5b6770\" },\n      { key:\"autodiag\", label:\"Autodiagnóstico\", dot:VIOLET },\n      { key:\"obs\",      label:\"Observación\",     dot:\"#00a096\" },\n      { key:\"acc\",      label:\"Acción\",          dot:VIOLET }\n    ];\n    const filterChips = chipDefs.map(cd => {\n      const on = filter === cd.key;\n      return { label:cd.label, dot:cd.dot, active:on,\n        bg: on ? \"#23303a\" : \"#fff\", color: on ? \"#fff\" : \"#5b6770\",\n        border: on ? \"#23303a\" : \"#e2dccf\",\n        set:() => this.setState({ filter:cd.key }) };\n    });\n    const showAutodiag = filter === \"all\" || filter === \"autodiag\";\n    const visibleTools = filter === \"all\" ? tools\n      : filter === \"autodiag\" ? []\n      : tools.filter(t => t.catKey === filter);\n    const catalogCount = tools.length + 1;\n\n    let active = {};\n    if(open !== null){\n      const t = this.data[open], color = this.cats[t.cat].color, tn = tint(color);\n      active = {\n        title:t.title, desc:t.desc, icon:t.icon, momento:t.momento,\n        catLabel:this.cats[t.cat].label, color, tint:tn, tintBorder:color+\"33\", fromAd:this.state.fromAd, porque:t.porque || \"\", porqueLead:t.porqueLead || \"\",\n        blocks: t.blocks.map((b,bi) => {\n          const o = { label:b.label, hIcon:b.icon || this.headerIcon(b.kind),\n            isPrompts:b.kind===\"prompts\", isCheck:b.kind===\"check\", isMatrix:b.kind===\"matrix\",\n            isIdeas:b.kind===\"ideas\", isTerms:b.kind===\"terms\", isNote:b.kind===\"note\",\n            isSemaforo:b.kind===\"semaforo\", isWrite:b.kind===\"write\", isLinks:b.kind===\"links\",\n            isCheckgroups:b.kind===\"checkgroups\", isForo:b.kind===\"foro\", isStrategies:b.kind===\"strategies\" };\n          if(b.kind === \"prompts\"){ o.items = b.items.map(s => R(s)); }\n          else if(b.kind === \"check\"){\n            o.items = b.items.map((text,ii) => {\n              const key = open+\"-\"+bi+\"-\"+ii, ck = !!checks[key];\n              return { text:R(text), checked:ck, boxBg: ck ? color : \"#fff\", toggle:() => this.setCheck(key) };\n            });\n          }\n          else if(b.kind === \"checkgroups\"){\n            o.groups = b.groups.map((g,gi) => ({\n              title:g.title,\n              items:g.items.map((text,ii) => {\n                const key = open+\"-\"+bi+\"-\"+gi+\"-\"+ii, ck = !!checks[key];\n                return { text:R(text), checked:ck, boxBg: ck ? color : \"#fff\", toggle:() => this.setCheck(key) };\n              })\n            }));\n          }\n          else if(b.kind === \"foro\"){ o.text = b.text; }\n          else if(b.kind === \"strategies\"){\n            o.items = b.items.map(it => ({\n              n:it.n, title:it.title, quote:it.quote || \"\", takeaway:it.takeaway || \"\",\n              hasSteps: !!(it.steps && it.steps.length),\n              steps: (it.steps || []).map(sp => ({ t:sp.t, d:sp.d })) }));\n          }\n          else if(b.kind === \"matrix\"){\n            o.cols = b.cols;\n            o.rows = b.rows.map((label,ri) => {\n              const key = open+\"-\"+bi+\"-\"+ri, sel = radios[key];\n              return { label:R(label), opts: b.cols.map((col,ci) => ({\n                selected: sel===ci, bg: sel===ci ? color+\"1a\" : \"#fff\",\n                border: sel===ci ? color : \"#e7e1d4\", select:() => this.setRadio(key,ci) })) };\n            });\n          }\n          else if(b.kind === \"ideas\"){\n            o.items = b.items.map(it => ({ label:it.label, quote: it.quote ? R(it.quote) : \"\",\n              hasLines: !!(it.lines && it.lines.length), lines: (it.lines || []).map(l => R(l)), foot: it.foot ? R(it.foot) : \"\" }));\n          }\n          else if(b.kind === \"terms\"){ o.items = b.items; o.foot = b.foot ? R(b.foot) : \"\"; }\n          else if(b.kind === \"note\"){ o.items = b.items.map(it => ({ icon:it.icon, text:R(it.text) })); }\n          else if(b.kind === \"links\"){ o.items = b.items.map(it => ({ icon:it.icon, text:it.text, href:it.href })); }\n          else if(b.kind === \"semaforo\"){\n            const key = open+\"-\"+bi, sel = radios[key];\n            o.items = b.items.map((it,oi) => ({ dot:it.dot, text:it.text, selected: sel===oi,\n              bg: sel===oi ? color+\"10\" : \"#fff\", border: sel===oi ? color : \"#e7e1d4\", select:() => this.setRadio(key,oi) }));\n          }\n          else if(b.kind === \"write\"){\n            const key = open+\"-\"+bi;\n            o.prompt = b.prompt; o.value = texts[key] || \"\"; o.onInput = (e) => this.setText(key, e.target.value);\n          }\n          return o;\n        })\n      };\n    }\n\n    const adIsResults = adOpen && adStep >= 6;\n    const adIsQuestion = adOpen && adStep < 6;\n    let adQuestionText = \"\", adDimension = \"\", adOptions = [], adCanNext = false;\n    if(adIsQuestion){\n      const q = this.adData[adStep];\n      adQuestionText = q.q; adDimension = q.label;\n      const sel = adAnswers[adStep];\n      adCanNext = sel !== undefined;\n      const letters = [\"A\",\"B\",\"C\",\"D\"];\n      adOptions = q.opts.map((text,oi) => {\n        const isSel = sel === oi;\n        return { letter:letters[oi], text, selected:isSel,\n          border: isSel ? VIOLET : \"#e7e1d4\", bg: isSel ? VIOLET+\"0f\" : \"#fff\",\n          chipBg: isSel ? VIOLET : \"#f1ece1\", chipColor: isSel ? \"#fff\" : \"#9aa1a8\",\n          select:() => this.setState(s => ({ adAnswers:{ ...s.adAnswers, [adStep]: oi } }), () => this.persist()) };\n      });\n    }\n    let adRecs = [], adMessage = [], adCierre = \"\";\n    if(adIsResults){\n      adMessage = this.recsMessage().map(p => this.richFull(p, VIOLET));\n      adCierre = this.adCierre;\n      adRecs = this.computeRecs().map(i => {\n        const t = this.data[i], c = this.cats[t.cat].color;\n        return { title:t.title, icon:t.icon, color:c, catLabel:this.cats[t.cat].label,\n          open:() => this.setState({ adOpen:false, open:i, fromAd:true }) };\n      });\n    }\n\n    const dateKey = open + \"-date\";\n    return {\n      tools, active, modalOpen: open !== null,\n      filterChips, showAutodiag, visibleTools, catalogCount,\n      adDone: Object.keys(adAnswers).length >= 6,\n      dateValue: open === null ? \"\" : (dates[dateKey] || \"\"),\n      dateInput: (e) => this.setDate(dateKey, e.target.value),\n      closeModal: () => this.setState({ open:null, fromAd:false }),\n      backToAd: () => this.setState({ open:null, adOpen:true, fromAd:false }),\n      stop: (e) => e.stopPropagation(),\n      saveFicha: () => window.print(),\n      saveAd: () => window.print(),\n      foroUrl: this.foroUrl,\n      formUrl: this.formUrl,\n      foroOpen: this.state.foroOpen,\n      creaCopied: this.state.creaCopied,\n      creaNotCopied: !this.state.creaCopied,\n      openForo: () => this.setState({ foroOpen:true }),\n      closeForo: () => this.setState({ foroOpen:false }),\n      copyCrea: () => { const code = \"S38K-2MHB-SV5RS\"; let ok = false; try { const ta = document.createElement(\"textarea\"); ta.value = code; ta.setAttribute(\"readonly\", \"\"); ta.style.position = \"fixed\"; ta.style.top = \"-9999px\"; document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0, code.length); ok = document.execCommand(\"copy\"); document.body.removeChild(ta); } catch(e) {} if (!ok && navigator.clipboard) { try { navigator.clipboard.writeText(code); } catch(e) {} } this.setState({ creaCopied:true }); setTimeout(() => this.setState({ creaCopied:false }), 1600); },\n      showBoot, bootFading,\n      adOpen, adIsQuestion, adIsResults,\n      adProgressLabel: \"Pregunta \" + (Math.min(adStep,5)+1) + \" de 6\",\n      adProgressPct: (((Math.min(adStep,6))/6)*100) + \"%\",\n      adDimension, adQuestionText, adOptions,\n      adShowBack: adStep > 0,\n      adNextLabel: adStep >= 5 ? \"Ver mi devolución\" : \"Siguiente\",\n      adNextBg: adCanNext ? VIOLET : \"#cdbcd3\",\n      adNextCursor: adCanNext ? \"pointer\" : \"not-allowed\",\n      adCtaLabel: (Object.keys(adAnswers).length >= 6) ? \"Ver mi devolución\" : \"Hacé el autodiagnóstico\",\n      adMessage, adCierre, adRecs,\n      startAd: () => { const done = Object.keys(adAnswers).length >= 6; window.location.hash = \"autodiagnostico\"; this.setState({ adOpen:true, adStep: done ? 6 : 0 }); },\n      closeAd: () => { if(window.location.hash === \"#autodiagnostico\") window.location.hash = \"\"; this.setState({ adOpen:false }); },\n      adNext: () => { if(adAnswers[adStep] === undefined) return; this.setState(s => ({ adStep: s.adStep + 1 })); },\n      adBack: () => this.setState(s => ({ adStep: Math.max(0, s.adStep - 1) })),\n      restartAd: () => this.setState({ adStep:0, adAnswers:{} }, () => this.persist()),\n      goHerramientas: () => { this.setState({ adOpen:false }); window.location.hash = \"#recursos\"; }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
