ños grupos.\" },\n              { t:\"Compartí\", d:\"Invitá a compartir a estudiantes diferentes en cada actividad.\" }\n            ],\n            takeaway:\"Así más estudiantes preparan una respuesta antes de hablar en público.\" },\n          { n:\"2\", title:\"Aviso anticipado\",\n            quote:\"En unos minutos voy a pedir que algunas personas compartan qué piensan. Tómense un momento para prepararse.\",\n            takeaway:\"Anticipar la participación ayuda a que más personas se animen a intervenir.\" }\n        ] },\n        { kind:\"write\", icon:\"message-circle\", label:\"Para pensar\",\n          prompt:\"¿Qué idea vas a probar?\" },\n        { kind:\"foro\", text:\"Entrá al foro, conocé qué se está probando en otras aulas y compartí tu propia experiencia.\" }\n      ] },\n\n    { cat:\"acc\", icon:\"languages\", title:\"Lenguaje inclusivo y no estereotipado\",\n      desc:\"Evitá reforzar asociaciones de género con las disciplinas STEM, en todo momento de la clase.\",\n      momento:\"En todo momento\",\n      encontras:[\"Una pregunta para revisar tu lenguaje\",\"Reemplazos concretos para usar ya\",\"Una idea para acordar con el grupo\"],\n      porqueLead:\"El lenguaje también enseña.\",\n      porque:\"Nombrar a todo el grupo evita reforzar la idea de que las disciplinas STEM son cosa de varones.\",\n      blocks:[\n        { kind:\"prompts\", icon:\"search\", label:\"Primero, revisá\", items:[\n          \"¿Los términos, el lenguaje, la comunicación, la forma y los ejemplos que usás en clase son *inclusivos*?\" ] },\n        { kind:\"terms\", label:\"Probá estos reemplazos\", items:[\n          { antes:\"los alumnos\", despues:\"las y los estudiantes · el estudiantado\" },\n          { antes:\"chicos\", despues:\"chicas y chicos · el grupo\" },\n          { antes:\"los científicos\", despues:\"científicas y científicos\" },\n          { antes:\"bienvenidos\", despues:\"bienvenidas y bienvenidos\" }\n        ], foot:\"También podés construir con el grupo *acuerdos de convivencia* que incluyan el lenguaje inclusivo, y colocar un *cartel visible* con ejemplos concretos.\" },\n        { kind:\"write\", icon:\"handshake\", label:\"Para la próxima clase\",\n          prompt:\"¿Qué término o cambio vas a empezar a usar?\" },\n        { kind:\"foro\", text:\"Conocé qué términos están usando tus colegas y compartí los tuyos.\" }\n      ] },\n\n    { cat:\"acc\", icon:\"shield-check\", title:\"Más confianza para enfrentar desafíos\",\n      desc:\"Las dificultades y los errores son oportunidades para construir confianza en las propias capacidades.\",\n      momento:\"Ante un error o frustración\",\n      encontras:[\"Frases para acompañar el error\",\"Ideas para valorar la persistencia\",\"Un acuerdo para la próxima clase\"],\n      porqueLead:\"Las niñas suelen mostrar menos confianza en STEM, aun con igual desempeño.\",\n      porque:\"Cómo acompañamos los desafíos y los errores ayuda a fortalecer esa confianza.\",\n      blocks:[\n        { kind:\"ideas\", icon:\"lightbulb\", label:\"Ideas para probar\", items:[\n          { label:\"Reconocé estrategias\", quote:\"Probaste *distintas opciones* hasta encontrar una solución.\" },\n          { label:\"Normalizá los errores\", quote:\"Equivocarse *también es parte de aprender*.\" },\n          { label:\"Valorá la persistencia\", quote:\"Seguiste *intentando* aunque era difícil.\" },\n          { label:\"Preguntá antes de resolver\", quote:\"¿Qué podrías *probar ahora*?\" }\n        ] },\n        { kind:\"write\", icon:\"handshake\", label:\"Acuerdo para la próxima clase\",\n          prompt:\"¿Qué mensaje o estrategia vas a incorporar, y en qué momento?\" },\n        { kind:\"foro\", text:\"Inspirate y compartí con tus colegas en el foro.\" }\n      ] },\n\n    { cat:\"acc\", icon:\"shuffle\", title:\"Diversificar los roles\",\n      desc:\"Que niñas y niños asuman por igual los diferentes roles y tareas en PC (organizar, programar, presentar, etc.).\",\n      momento:\"Al armar grupos\",\n      encontras:[\"Pasos para preparar los roles antes de empezar\",\"Acciones concretas durante la clase\",\"Un espacio para compartir en el foro\"],\n      porqueLead:\"\",\n      porque:\"Puede suceder que ciertos roles o tareas siempre recaigan en las mismas personas. Por ejemplo, es común que el rol de programar termine recayendo más en los niños, y el de presentar el trabajo al resto del aula en las niñas. Esto no responde a diferencias de capacidad, sino a patrones que se repiten sin que nos demos cuenta. Por eso es importante que los roles roten entre niñas y niños, para que todos y todas puedan formarse y ganar confianza en los distintos roles.\",\n      blocks:[\n        { kind:\"note\", label:\"Antes de empezar la actividad\", items:[\n          { icon:\"target\", text:\"Identificá cuál será el *rol técnico principal* (por ejemplo: programar, manejar el dispositivo o construir).\" },\n          { icon:\"history\", text:\"Pensá *quiénes ocuparon ese rol* en las últimas clases.\" },\n          { icon:\"layout-grid\", text:\"Prepará tarjetas para asignar los roles a *todo el equipo*.\" } ] },\n        { kind:\"check\", label:\"Durante la actividad\", items:[\n          \"Asigná el rol técnico a un/a estudiante que haya tenido *menos oportunidades* de desempeñarlo.\",\n          \"Explicá que *todos los integrantes* del equipo irán teniendo la oportunidad de asumir ese rol en distintas clases.\",\n          \"Recorré el aula: acercarte *reduce la barrera* para pedir ayuda en público.\" ] },\n        { kind:\"write\", icon:\"message-circle\", label:\"Para pensar\",\n          prompt:\"¿Qué pasó cuando organizaste los roles?\" },\n        { kind:\"foro\", text:\"Sumate a la conversación en el foro y comentalo ahí con tus colegas!\" }\n      ] }\n  ];\n\n  adData = [\n    { dim:\"obs\", label:\"Qué valorás\", q:\"¿Qué te parece importante promover en el grupo durante una clase de Pensamiento Computacional?\",\n      opts:[ \"Que desarrollen habilidades para resolver desafíos.\",\n             \"Que se interesen y disfruten las actividades.\",\n             \"Que aprendan a trabajar colaborativamente.\",\n             \"Que tengan las mismas oportunidades de asumir distintos roles y participar.\" ] },\n    { dim:\"obs\", label:\"Qué observás\", q:\"¿A qué solés prestar atención durante las clases de Pensamiento Computacional?\",\n      opts:[ \"Si mis estudiantes logran completar la actividad propuesta.\",\n             \"Si mis estudiantes muestran interés y motivación.\",\n             \"Cómo se organizan y trabajan los grupos.\",\n             \"Quiénes participan más, quiénes participan menos y qué roles asumen.\" ] },\n    { dim:\"obs\", label:\"Diferencias en la participación\", q:\"Según tu experiencia, cuando algunas personas participan menos que otras durante la clase de Pensamiento Computacional, ¿a qué creés que puede deberse?\",\n      opts:[ \"A que tienen intereses diferentes, ya que las propuestas y las oportunidades de participación son las mismas para todas.\",\n             \"A que tienen más experiencia o afinidad y se sienten más preparadas para la tarea.\",\n             \"A que la dinámica del grupo puede favorecer que algunas participen más que otras.\",\n             \"A que los mensajes y expectativas que reciben fuera del aula influyen en su confianza para participar.\" ] },\n    { dim:\"acc\", label:\"Tu rol en el programa\", q:\"Pensando en tu rol durante las clases de Pensamiento Computacional, ¿cuál es tu principal aporte dentro del programa?\",\n      opts:[ \"Mi principal aporte es acompañar aspectos organizativos de la clase.\",\n             \"Mi principal aporte es brindar apoyo a estudiantes cuando lo necesitan.\",\n             \"Mi principal aporte es observar cómo participa el grupo y favorecer que todas las personas se involucren.\",\n             \"Mi principal aporte es planificar junto al docente remoto cómo organizar la participación y acompañar el aprendizaje del grupo.\" ] },\n    { dim:\"acc\", label:\"Roles técnicos\", q:\"Si durante una actividad de programación en equipos observás que siempre son las mismas personas quienes usan el teclado, ¿qué hacés?\",\n      opts:[ \"Permitir que cada equipo distribuya los roles como prefiera.\",\n             \"Conversar con el equipo para entender cómo se organizaron.\",\n             \"Animar a que prueben tareas diferentes.\",\n             \"Coordinar junto al docente remoto estrategias para diversificar los roles.\" ] },\n    { dim:\"acc\", label:\"Confianza\", q:\"Si una estudiante evita participar porque cree que “no es buena para Pensamiento Computacional”, ¿qué hacés?\",\n      opts:[ \"Respetar su decisión y acompañarla desde el rol que prefiera asumir.\",\n             \"Animarla a intentarlo.\",\n             \"Ayudarla a reconocer avances o logros concretos que ya alcanzó.\",\n             \"Generar oportunidades graduales para que gane confianza en ese tipo de tareas.\" ] }\n  ];\n\n  adProfiles = {\n    AA: {\n      msg:[ \"Tus respuestas muestran que **ya prestás atención a cómo se distribuye la participación en el aula**: quiénes se involucran, quiénes quedan afuera, cómo se organizan los equipos.\",\n            \"Y que cuando notás algo, *tenés recursos para intervenir*.\",\n            \"Las herramientas del kit te ofrecen formas concretas de llevar lo que ya observás a pequeñas acciones dentro del aula.\" ],\n      recs:[5,1,2] },\n    BA: {\n      msg:[ \"Tus respuestas muestran que **tenés disposición para acompañar a tus estudiantes y actuar cuando algo no funciona**.\",\n            \"Esa actitud es *el motor de cualquier cambio* en el aula.\",\n            \"Las herramientas del kit pueden ayudarte a conectar esa disposición con algunas dinámicas que a veces pasan desapercibidas: quiénes asumen roles técnicos, quiénes piden ayuda en voz alta y quiénes prefieren no hacerlo.\" ],\n      recs:[0,1,4] },\n    AB: {\n      msg:[ \"Tus respuestas muestran que **sos observadora de lo que pasa en el aula**: notás cómo se organizan los grupos, quiénes participan más y quiénes menos.\",\n            \"Esa capacidad de observación es *el primer paso para cualquier cambio*.\",\n            \"Las herramientas del kit proponen acciones concretas para transformar observaciones en pequeñas decisiones fáciles de aplicar dentro del aula.\" ],\n      recs:[2,4,5] },\n    BB: {\n      msg:[ \"Tus respuestas sugieren que **tu foco está puesto en acompañar a tus estudiantes en lo que necesitan en el momento**.\",\n            \"Esa es *la base de una buena relación pedagógica*.\",\n            \"Las herramientas del kit invitan a sumar una nueva mirada: prestar atención a algunas dinámicas de participación que pueden pasar desapercibidas, y probar pequeños cambios que no requieren modificar cómo trabajás.\" ],\n      recs:[0,3,1] }\n  };\n  adCierre = \"El kit completo tiene 6 tarjetas — a lo largo de la intervención vas a ir recibiendo propuestas para explorarlas todas.\";\n\n  headerIcon(kind){\n    return ({ prompts:\"list\", check:\"check-square\", matrix:\"smile\", ideas:\"lightbulb\",\n      terms:\"replace\", note:\"info\", semaforo:\"circle-dot\", write:\"message-circle\", links:\"package\",\n      checkgroups:\"check-square\", foro:\"messages-square\", strategies:\"lightbulb\" })[kind] || \"circle\";\n  }\n\n  componentDidMount(){\n    try {\n      const s = JSON.parse(localStorage.getItem(\"aulaactiva\") || \"{}\");\n      this.setState({\n        checks: s.checks || {}, radios: s.radios || {},\n        texts: s.texts || {}, dates: s.dates || {}, adAnswers: s.adAnswers || {}\n      });\n    } catch(e){}\n    this._icons();\n  }\n  componentDidUpdate(){ this._icons(); }\n  _icons(){\n    if(window.lucide && window.lucide.createIcons){ try { window.lucide.createIcons(); } catch(e){} }\n    else { setTimeout(()=>this._icons(), 120); }\n  }\n  persist(){\n    const { checks, radios, texts, dates, adAnswers } = this.state;\n    try { localStorage.setItem(\"aulaactiva\", JSON.stringify({ checks, radios, texts, dates, adAnswers })); } catch(e){}\n  }\n  setCheck(k){ this.setState(s => ({ checks:{ ...s.checks, [k]: !s.checks[k] } }), () => this.persist()); }\n  setRadio(k,v){ this.setState(s => ({ radios:{ ...s.radios, [k]: v } }), () => this.persist()); }\n  setText(k,v){ this.setState(s => ({ texts:{ ...s.texts, [k]: v } }), () => this.persist()); }\n  setDate(k,v){ this.setState(s => ({ dates:{ ...s.dates, [k]: v } }), () => this.persist()); }\n\n  // Traductor de markdown ligero: **negrita** y *cursiva*\n  rich(str, color){\n    if(str == null) return str;\n    const parts = String(str).split(/\\*([^*]+)\\*/g);\n    return React.createElement(React.Fragment, null, parts.map((p,i) =>\n      i % 2 === 1 ? React.createElement(\"strong\", { key:i, style:{ color, fontWeight:800 } }, p) : p\n    ));\n  }\n\n  // Traductor completo: soporta **negrita** y *cursiva* en el mismo texto\n  richFull(str, boldColor){\n    if(str == null) return str;\n    const col = boldColor || \"#82378C\";\n    const nodes = [];\n    let key = 0;\n    String(str).split(/\\*\\*([^*]+)\\*\\*/g).forEach((seg, bi) => {\n      if(bi % 2 === 1){\n        nodes.push(React.createElement(\"strong\", { key:key++, style:{ color:col, fontWeight:800 } }, seg));\n      } else if(seg){\n        seg.split(/\\*([^*]+)\\*/g).forEach((s, ii) => {\n          if(ii % 2 === 1) nodes.push(React.createElement(\"em\", { key:key++, style:{ fontStyle:\"italic\", color:\"#23303a\" } }, s));\n          else if(s) nodes.push(React.createElement(React.Fragment, { key:key++ }, s));\n        });\n      }\n    });\n    return React.createElement(React.Fragment, null, nodes);\n  }\n\n  computeProfile(){\n    const { adAnswers } = this.state;\n    let obs = 0, acc = 0;\n    this.adData.forEach((q,qi) => {\n      const a = adAnswers[qi];\n      if(a === undefined) return;\n      if(a >= 2){\n        if(q.dim === \"obs\") obs++; else acc++;\n      }\n    });\n    const obsHigh = obs >= 2, accHigh = acc >= 2;\n    const key = (obsHigh ? \"A\" : \"B\") + (accHigh ? \"A\" : \"B\");\n    return this.adProfiles[key];\n  }\n\n  computeRecs(){ return this.computeProfile().recs; }\n  recsMessage(){ return this.computeProfile().msg; }\n\n  renderVals(){\n    const { open, checks, radios, texts, dates, adOpen, adStep, adAnswers, filter } = this.state;\n    const tint = (c) => c + \"14\";\n    const VIOLET = \"#82378C\";\n    const R = (s) => this.rich(s, open!=null ? this.cats[this.data[open].cat].color : \"#000\");\n\n    const hexShadow = (hex) => {\n      const h = hex.replace(\"#\",\"\"); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);\n      return `rgba(${r},${g},${b},.34)`;\n    };\n    const accents = [\"#FFC800\",\"#F09100\",\"#FFC800\",\"#50AF32\",\"#FFC800\",\"#5AC8F0\"];\n    const tools = this.data.map((t,i) => {\n      const c = this.cats[t.cat].color;\n      return { title:t.title, icon:t.icon, momento:t.momento, catKey:t.cat,\n        catLabel:this.cats[t.cat].label, color:c, tint:tint(c),\n        shadow:hexShadow(c), accent:accents[i % accents.length],\n        n:String(i+1).padStart(2,\"0\"),\n        encontras:t.encontras, open:() => this.setState({ open:i }) };\n    });\n\n    const adDone = Object.keys(adAnswers).length >= 6;\n    const chipDefs = [\n      { key:\"all\",      label:\"Todo\",            dot:\"#5b6770\" },\n      { key:\"autodiag\", label:\"Autodiagnóstico\", dot:VIOLET },\n      { key:\"obs\",      label:\"Observación\",     dot:\"#00a096\" },\n      { key:\"acc\",      label:\"Acción\",          dot:VIOLET }\n    ];\n    const filterChips = chipDefs.map(cd => {\n      const on = filter === cd.key;\n      return { label:cd.label, dot:cd.dot, active:on,\n        bg: on ? \"#23303a\" : \"#fff\", color: on ? \"#fff\" : \"#5b6770\",\n        border: on ? \"#23303a\" : \"#e2dccf\",\n        set:() => this.setState({ filter:cd.key }) };\n    });\n    const showAutodiag = filter === \"all\" || filter === \"autodiag\";\n    const visibleTools = filter === \"all\" ? tools\n      : filter === \"autodiag\" ? []\n      : tools.filter(t => t.catKey === filter);\n    const catalogCount = tools.length + 1;\n\n    let active = {};\n    if(open !== null){\n      const t = this.data[open], color = this.cats[t.cat].color, tn = tint(color);\n      active = {\n        title:t.title, desc:t.desc, icon:t.icon, momento:t.momento,\n        catLabel:this.cats[t.cat].label, color, tint:tn, tintBorder:color+\"33\", fromAd:this.state.fromAd, porque:t.porque || \"\", porqueLead:t.porqueLead || \"\",\n        blocks: t.blocks.map((b,bi) => {\n          const o = { label:b.label, hIcon:b.icon || this.headerIcon(b.kind),\n            isPrompts:b.kind===\"prompts\", isCheck:b.kind===\"check\", isMatrix:b.kind===\"matrix\",\n            isIdeas:b.kind===\"ideas\", isTerms:b.kind===\"terms\", isNote:b.kind===\"note\",\n            isSemaforo:b.kind===\"semaforo\", isWrite:b.kind===\"write\", isLinks:b.kind===\"links\",\n            isCheckgroups:b.kind===\"checkgroups\", isForo:b.kind===\"foro\", isStrategies:b.kind===\"strategies\" };\n          if(b.kind === \"prompts\"){ o.items = b.items.map(s => R(s)); }\n          else if(b.kind === \"check\"){\n            o.items = b.items.map((text,ii) => {\n              const key = open+\"-\"+bi+\"-\"+ii, ck = !!checks[key];\n              return { text:R(text), checked:ck, boxBg: ck ? color : \"#fff\", toggle:() => this.setCheck(key) };\n            });\n          }\n          else if(b.kind === \"checkgroups\"){\n            o.groups = b.groups.map((g,gi) => ({\n              title:g.title,\n              items:g.items.map((text,ii) => {\n                const key = open+\"-\"+bi+\"-\"+gi+\"-\"+ii, ck = !!checks[key];\n                return { text:R(text), checked:ck, boxBg: ck ? color : \"#fff\", toggle:() => this.setCheck(key) };\n              })\n            }));\n          }\n          else if(b.kind === \"foro\"){ o.text = b.text; }\n          else if(b.kind === \"strategies\"){\n            o.items = b.items.map(it => ({\n              n:it.n, title:it.title, quote:it.quote || \"\", takeaway:it.takeaway || \"\",\n              hasSteps: !!(it.steps && it.steps.length),\n              steps: (it.steps || []).map(sp => ({ t:sp.t, d:sp.d })) }));\n          }\n          else if(b.kind === \"matrix\"){\n            o.cols = b.cols;\n            o.rows = b.rows.map((label,ri) => {\n              const key = open+\"-\"+bi+\"-\"+ri, sel = radios[key];\n              return { label:R(label), opts: b.cols.map((col,ci) => ({\n                selected: sel===ci, bg: sel===ci ? color+\"1a\" : \"#fff\",\n                border: sel===ci ? color : \"#e7e1d4\", select:() => this.setRadio(key,ci) })) };\n            });\n          }\n          else if(b.kind === \"ideas\"){\n            o.items = b.items.map(it => ({ label:it.label, quote: it.quote ? R(it.quote) : \"\",\n              hasLines: !!(it.lines && it.lines.length), lines: (it.lines || []).map(l => R(l)), foot: it.foot ? R(it.foot) : \"\" }));\n          }\n          else if(b.kind === \"terms\"){ o.items = b.items; o.foot = b.foot ? R(b.foot) : \"\"; }\n          else if(b.kind === \"note\"){ o.items = b.items.map(it => ({ icon:it.icon, text:R(it.text) })); }\n          else if(b.kind === \"links\"){ o.items = b.items.map(it => ({ icon:it.icon, text:it.text, href:it.href })); }\n          else if(b.kind === \"semaforo\"){\n            const key = open+\"-\"+bi, sel = radios[key];\n            o.items = b.items.map((it,oi) => ({ dot:it.dot, text:it.text, selected: sel===oi,\n              bg: sel===oi ? color+\"10\" : \"#fff\", border: sel===oi ? color : \"#e7e1d4\", select:() => this.setRadio(key,oi) }));\n          }\n          else if(b.kind === \"write\"){\n            const key = open+\"-\"+bi;\n            o.prompt = b.prompt; o.value = texts[key] || \"\"; o.onInput = (e) => this.setText(key, e.target.value);\n          }\n          return o;\n        })\n      };\n    }\n\n    const adIsResults = adOpen && adStep >= 6;\n    const adIsQuestion = adOpen && adStep < 6;\n    let adQuestionText = \"\", adDimension = \"\", adOptions = [], adCanNext = false;\n    if(adIsQuestion){\n      const q = this.adData[adStep];\n      adQuestionText = q.q; adDimension = q.label;\n      const sel = adAnswers[adStep];\n      adCanNext = sel !== undefined;\n      const letters = [\"A\",\"B\",\"C\",\"D\"];\n      adOptions = q.opts.map((text,oi) => {\n        const isSel = sel === oi;\n        return { letter:letters[oi], text, selected:isSel,\n          border: isSel ? VIOLET : \"#e7e1d4\", bg: isSel ? VIOLET+\"0f\" : \"#fff\",\n          chipBg: isSel ? VIOLET : \"#f1ece1\", chipColor: isSel ? \"#fff\" : \"#9aa1a8\",\n          select:() => this.setState(s => ({ adAnswers:{ ...s.adAnswers, [adStep]: oi } }), () => this.persist()) };\n      });\n    }\n    let adRecs = [], adMessage = [], adCierre = \"\";\n    if(adIsResults){\n      adMessage = this.recsMessage().map(p => this.richFull(p, VIOLET));\n      adCierre = this.adCierre;\n      adRecs = this.computeRecs().map(i => {\n        const t = this.data[i], c = this.cats[t.cat].color;\n        return { title:t.title, icon:t.icon, color:c, catLabel:this.cats[t.cat].label,\n          open:() => this.setState({ adOpen:false, open:i, fromAd:true }) };\n      });\n    }\n\n    const dateKey = open + \"-date\";\n    return {\n      tools, active, modalOpen: open !== null,\n      filterChips, showAutodiag, visibleTools, catalogCount,\n      adDone: Object.keys(adAnswers).length >= 6,\n      dateValue: open === null ? \"\" : (dates[dateKey] || \"\"),\n      dateInput: (e) => this.setDate(dateKey, e.target.value),\n      closeModal: () => this.setState({ open:null, fromAd:false }),\n      backToAd: () => this.setState({ open:null, adOpen:true, fromAd:false }),\n      stop: (e) => e.stopPropagation(),\n      saveFicha: () => window.print(),\n      saveAd: () => window.print(),\n      foroUrl: this.foroUrl,\n      formUrl: this.formUrl,\n      foroOpen: this.state.foroOpen,\n      creaCopied: this.state.creaCopied,\n      creaNotCopied: !this.state.creaCopied,\n      openForo: () => this.setState({ foroOpen:true }),\n      closeForo: () => this.setState({ foroOpen:false }),\n      copyCrea: () => { const code = \"S38K-2MHB-SV5RS\"; let ok = false; try { const ta = document.createElement(\"textarea\"); ta.value = code; ta.setAttribute(\"readonly\", \"\"); ta.style.position = \"fixed\"; ta.style.top = \"-9999px\"; document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0, code.length); ok = document.execCommand(\"copy\"); document.body.removeChild(ta); } catch(e) {} if (!ok && navigator.clipboard) { try { navigator.clipboard.writeText(code); } catch(e) {} } this.setState({ creaCopied:true }); setTimeout(() => this.setState({ creaCopied:false }), 1600); },\n      adOpen, adIsQuestion, adIsResults,\n      adProgressLabel: \"Pregunta \" + (Math.min(adStep,5)+1) + \" de 6\",\n      adProgressPct: (((Math.min(adStep,6))/6)*100) + \"%\",\n      adDimension, adQuestionText, adOptions,\n      adShowBack: adStep > 0,\n      adNextLabel: adStep >= 5 ? \"Ver mi devolución\" : \"Siguiente\",\n      adNextBg: adCanNext ? VIOLET : \"#cdbcd3\",\n      adNextCursor: adCanNext ? \"pointer\" : \"not-allowed\",\n      adCtaLabel: (Object.keys(adAnswers).length >= 6) ? \"Ver mi devolución\" : \"Hacé el autodiagnóstico\",\n      adMessage, adCierre, adRecs,\n      startAd: () => { const done = Object.keys(adAnswers).length >= 6; this.setState({ adOpen:true, adStep: done ? 6 : 0 }); },\n      closeAd: () => this.setState({ adOpen:false }),\n      adNext: () => { if(adAnswers[adStep] === undefined) return; this.setState(s => ({ adStep: s.adStep + 1 })); },\n      adBack: () => this.setState(s => ({ adStep: Math.max(0, s.adStep - 1) })),\n      restartAd: () => this.setState({ adStep:0, adAnswers:{} }, () => this.persist()),\n      goHerramientas: () => { this.setState({ adOpen:false }); window.location.hash = \"#recursos\"; }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
